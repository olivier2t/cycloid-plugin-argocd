<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ArgoCD</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
  .empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; padding: 1rem;
    font: 14px system-ui, -apple-system, sans-serif; color: #555;
    text-align: center;
  }
  .empty code { background: #eef0f4; padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>
<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const org = params.get('org');
    const env = params.get('env');

    if (!org || !env) {
      document.body.innerHTML =
        '<div class="empty">'
        + 'Missing <code>org</code> or <code>env</code> in the URL — '
        + 'this plugin must be opened from a Cycloid component tab.'
        + '</div>';
      return;
    }

    const url =
      'https://argocd.' + encodeURIComponent(org) + '-' + encodeURIComponent(env)
      + '.demo.cycloid.io/applications/argocd/app-of-apps';

    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.referrerPolicy = 'no-referrer-when-downgrade';
    iframe.allow = 'clipboard-read; clipboard-write';
    document.body.appendChild(iframe);
  })();
</script>
</body>
</html>
