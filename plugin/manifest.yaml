description: "Sync ArgoCD applications and show them on an org-wide ArgoCD side menu page (iframe UI)."
icon: "https://raw.githubusercontent.com/cncf/artwork/main/projects/argo/icon/color/argo-icon-color.svg"

# One install per Cycloid organization. The plugin syncs against a single
# ArgoCD instance per org (https://argocd.<org>.demo.cycloid.io) and parses
# each app's (env, component) from its name/namespace, which follow the
# Cycloid convention "<org>-<env>-<component>".
configuration:
  - name: "ArgoCD Username"
    description: "Local ArgoCD account used to log into the ArgoCD API."
    key: argocd_username
    widget: simple_text
    type: string
    default: "admin"
    required: true

  - name: "ArgoCD Password"
    description: "Password for the ArgoCD account above. Stored as a plugin secret; treat this field as sensitive."
    key: argocd_password
    widget: simple_text
    type: string
    required: true

  # cycloid_org_slug must be typed manually at install time. The Cycloid
  # ($ .org $) template variable is NOT substituted in manifest `default:`
  # values (only in widgets.yaml `query:` strings), so we don't pre-fill
  # it — operators must enter their organization canonical explicitly.
  - name: "Cycloid Organization Canonical"
    description: "Type your Cycloid organization canonical here (e.g. cycloid). Used to parse env / component out of ArgoCD app names following the convention '<org>-<env>-<component>'."
    key: cycloid_org_slug
    widget: simple_text
    type: string
    required: true

  # Optional override for the ArgoCD URL. Useful when the plugin sandbox
  # cannot resolve public hostnames (UDP/53 egress is firewalled) — type the
  # raw IP here and also set argocd_insecure_tls=true so the IP-vs-cert
  # hostname mismatch doesn't fail the TLS handshake.
  - name: "ArgoCD URL (optional override)"
    description: "Leave blank to use https://argocd.<org>.demo.cycloid.io. Set when the plugin container's DNS can't see the public hostname (e.g. https://34.253.192.110 to skip DNS)."
    key: argocd_url_override
    widget: simple_text
    type: string
    required: false
