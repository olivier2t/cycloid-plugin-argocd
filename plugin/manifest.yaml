description: "Import ArgoCD applications and show them as a tab on Cycloid components."
icon: "https://raw.githubusercontent.com/cncf/artwork/main/projects/argo/icon/color/argo-icon-color.svg"

# The plugin discovers organizations and environments at sync time via the
# Cycloid Plugin Manager proxy (PROXY_URL / PLUGIN_SECRET), so the operator
# only has to supply the ArgoCD credentials. Org/env slugs are no longer in
# the install form; they're derived from each component's context at
# widget-render time (via the JOIN relations declared in widgets.yaml).
configuration:
  - name: "ArgoCD Username"
    description: "Local ArgoCD account used to log into the ArgoCD API."
    key: argocd_username
    widget: simple_text
    type: string
    required: true

  - name: "ArgoCD Password"
    description: "Password for the ArgoCD account above. Stored as a plugin secret; treat this field as sensitive."
    key: argocd_password
    widget: simple_text
    type: string
    required: true
