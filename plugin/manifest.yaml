description: "Import ArgoCD applications and show them as a tab on Cycloid components."
icon: "https://raw.githubusercontent.com/cncf/artwork/main/projects/argo/icon/color/argo-icon-color.svg"

# The install form is intentionally minimal: only ArgoCD credentials. The
# organization is fixed at install time (the install is org-scoped) and the
# environment is dynamic per widget render — neither belongs in the form.
# How the plugin LEARNS those values at runtime is what this diagnostic
# build (1.5.x) is here to find out: see [INFO] /_cy/* logs after install.
configuration:
  - name: "ArgoCD Username"
    description: "Local ArgoCD account used to log into the ArgoCD API."
    key: argocd_username
    widget: simple_text
    type: string
    required: true

  - name: "ArgoCD Password"
    description: "Password for the ArgoCD account above. Stored as a plugin secret; treat this field as sensitive."
    key: argocd_password
    widget: simple_text
    type: string
    required: true
