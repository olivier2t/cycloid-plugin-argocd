- type: table
  placement:
    type: component
    config:
      tab_name: ArgoCD
  widget:
    # 1.6.9 DIAGNOSTIC: no WHERE, no JOINs, no relations.
    # Proves whether the Plugin Manager can read this install's SQLite at all.
    # If /query still returns Data:null, the PM is not reading the plugin DB
    # (platform issue). If Data has rows, restore filtered query in 1.6.10.
    query: >
      SELECT name, component, sync_status, health_status, namespace, last_synced, url
      FROM argocd_apps
    columns:
      - value: name
        title: Application
        type: string
      - value: component
        title: Component
        type: string
      - value: sync_status
        title: Sync
        type: string
      - value: health_status
        title: Health
        type: string
      - value: namespace
        title: Namespace
        type: string
      - value: last_synced
        title: Last Synced
        type: string
      - value: url
        title: Link
        type: string
