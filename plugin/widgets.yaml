- type: table
  placement:
    type: component
    config:
      tab_name: ArgoCD
  widget:
    # The Plugin Manager substitutes ($ .org $), ($ .env $) and ($ .component $)
    # with the current widget context before running this SQL against the
    # plugin's SQLite. The component filter narrows the result to just the
    # ArgoCD app(s) that belong to the current Cycloid component (which
    # follows the naming convention "<org>-<env>-<component>" — see
    # server.ts parseAppName).
    query: >
      SELECT a.name, a.sync_status, a.health_status, a.namespace, a.last_synced, a.url
      FROM argocd_apps AS a
      JOIN environments  AS e ON e.id = a.environment_id
      JOIN organizations AS o ON o.id = e.organization_id
      WHERE o.slug = '($ .org $)'
        AND e.slug = '($ .env $)'
        AND a.component = '($ .component $)'
    relations:
      - name: "Organization Slug"
        description: "The current Cycloid organization."
        selector: "o.slug"
      - name: "Environment Slug"
        description: "The current Cycloid environment."
        selector: "e.slug"
      - name: "Component"
        description: "The current Cycloid component."
        selector: "a.component"
    columns:
      - value: name
        title: Application
        type: string
      - value: sync_status
        title: Sync
        type: string
      - value: health_status
        title: Health
        type: string
      - value: namespace
        title: Namespace
        type: string
      - value: last_synced
        title: Last Synced
        type: string
      - value: url
        title: Link
        type: string
