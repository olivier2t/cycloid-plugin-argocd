- type: table
  placement:
    type: component
    config:
      tab_name: ArgoCD
  widget:
    # 1.6.2 DIAGNOSTIC: no WHERE clause. If even this unfiltered query
    # returns no rows, the Plugin Manager isn't executing SQL against the
    # plugin's SQLite at all (cache, separate DB, or HTTP-based query
    # contract we haven't implemented). If it DOES return rows, then the
    # whole pipeline works and we just need to add the right WHERE clause
    # back (with whichever substitution mechanism actually works in this
    # Cycloid version).
    query: >
      SELECT a.name, a.component, a.sync_status, a.health_status, a.namespace, a.last_synced, a.url
      FROM argocd_apps AS a
      JOIN environments  AS e ON e.id = a.environment_id
      JOIN organizations AS o ON o.id = e.organization_id
    columns:
      - value: name
        title: Application
        type: string
      - value: component
        title: Component
        type: string
      - value: sync_status
        title: Sync
        type: string
      - value: health_status
        title: Health
        type: string
      - value: namespace
        title: Namespace
        type: string
      - value: last_synced
        title: Last Synced
        type: string
      - value: url
        title: Link
        type: string
