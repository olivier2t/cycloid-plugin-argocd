# iframe + sideMenuPage: the Cycloid console on this stack renders the side
# menu entry but shows unknownWidgetTitle for table + sideMenuPage even when
# the plugin_widgets/.../query API returns rows. The plugin serves the table
# as HTML from GET / inside the iframe instead.
- type: iframe
  placement:
    type: sideMenuPage
    config:
      title: ArgoCD
      description: ArgoCD applications synced for this organization
      icon: https://raw.githubusercontent.com/cncf/artwork/main/projects/argo/icon/color/argo-icon-color.svg
  widget:
    query: /
